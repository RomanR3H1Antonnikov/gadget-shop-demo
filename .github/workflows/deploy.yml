name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/gadgetbot/gadget-shop-demo
            git pull origin master
            /opt/gadgetbot/venv/bin/pip install -r requirements.txt -q
            systemctl restart gadgetbot
            systemctl status gadgetbot --no-pager